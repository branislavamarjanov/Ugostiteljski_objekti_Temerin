<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8" />
    <title>Ugostiteljski objekti Temerin</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>

<body>

<header>
    <h1>Ugostiteljski objekti u Temerinu</h1>
</header>

<div id="sidebar">

    <h2>Pretraga</h2>

    <label>Naselje:</label>
    <select id="naseljeInput">
        <option value="">Sva naselja</option>
        <option value="Temerin">Temerin</option>
        <option value="Bački Jarak">Bački Jarak</option>
        <option value="Sirig">Sirig</option>
    </select>

    <label>Tip objekta:</label>
    <select id="tipInput">
        <option value="">Svi tipovi</option>
        <option value="kafić">Kafić</option>
        <option value="restoran">Restoran</option>
        <option value="picerija">Picerija</option>
        <option value="brza_hrana">Brza hrana</option>
		<option value="poslastičarnica">Poslastičarnica</option>
		<option value="pekara">Pekara</option>
		<option value="pub">Pab</option>
		<option value="hamburgerija">Hamburgerija</option>
    </select>

    <button id="searchBtn">Pretraži</button>

    <h2>Slojevi</h2>

    <label class="layer-option">
        <input type="checkbox" id="rasterCheck" checked>
        Raster podloga
    </label>

    <label class="layer-option">
        <input type="checkbox" id="graniceCheck" checked>
        Granice naselja
    </label>

    <label class="layer-option">
        <input type="checkbox" id="tackeCheck" checked>
        Ugostiteljski objekti
    </label>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="app.js"></script>

</body>
</html>
